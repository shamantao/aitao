paths:
  storage_root: ${HOME}/Downloads/_sources/aitao
  models_dir: ${HOME}/Downloads/_sources/AI-models
  logs_dir: ${storage_root}/logs
  queue_dir: ${storage_root}/queue
  cache_dir: ${storage_root}/cache
  corrections_dir: ${storage_root}/corrections
  vector_db_dir: ${storage_root}/lancedb
worker:
  poll_interval: 5
  cpu_threshold: 80.0
  stuck_task_timeout: 600
indexing:
  enabled: true
  interval_minutes: 10
  include_paths:
  - ${HOME}/Downloads/_Volumes/
  - ${HOME}/Documents/
  exclude_dirs:
  - __pycache__
  - .git
  - .venv
  - venv
  - env
  - .env
  - node_modules
  - .ds_store
  - dist
  - build
  - target
  - site-packages
  - .idea
  - .vscode
  exclude_files:
  - .DS_Store
  - package-lock.json
  - yarn.lock
  - Thumbs.db
  exclude_extensions:
  - .lock
  - .log
  - .tmp
  - .swp
  - .cache
ocr:
  provider: auto
  languages:
  - fr
  - en
  - zh
  confidence_threshold: 0.7
  router:
    table_area_min: 0.05
    min_intersections: 2
    min_line_density: 0.0002
  paddleocr:
    use_gpu: false
    use_angle_cls: true
    det_db_thresh: 0.3
  qwen_vl:
    model_path: ${HOME}/Downloads/_sources/AI-models/qwen2-vl-7b/Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf
    n_gpu_layers: -1
    context_size: 4096
    max_tokens: 2048
translation:
  provider: mbart50
  source_lang: fr
  target_lang: zh_TW
  score_translations: true
  min_confidence: 0.6
  mbart50:
    model_name: facebook/mbart-large-50-many-to-many-mmt
    use_gpu: false
    batch_size: 8
  nllb:
    model_name: facebook/nllb-200-distilled-600M
    use_gpu: false
    batch_size: 8
search:
  meilisearch:
    url: http://localhost:7700
    api_key: ''
    index_name: aitao_documents
    searchable_attributes:
    - title
    - content
    - category
    - tags
    displayed_attributes:
    - id
    - title
    - file_path
    - category
    - language
    - created_at
    - updated_at
    filterable_attributes:
    - category
    - language
    - created_at
    - file_type
  lancedb:
    embedding_model: BAAI/bge-m3
    table_name: aitao_embeddings
    dimension: 1024
    top_k: 20
    min_score: 0.45
    offline_mode: true
categories:
  enabled: true
  labels:
  - administration
  - comptabilite
  - juridique
  - technique
  - personnel
  - commercial
  - medical
  - education
  - autre
  default: autre
llm:
  backend: ollama
  ollama_url: http://localhost:11434
  default_model: llama3.1-local:latest
  models:
  - name: llama3.1-local:latest
    required: true
    size_gb: 4.7
    roles:
    - chat
    - rag
    description: General-purpose LLM for chat and RAG
  - name: qwen2.5-coder-local:latest
    required: false
    size_gb: 4.4
    roles:
    - code
    description: Code-focused LLM (better for code assistance)
  - name: qwen3-vl:latest
    required: false
    size_gb: 6.1
    roles:
    - ocr
    - vision
    description: Qwen3-VL for vision & OCR tasks
  startup:
    check_models: true
    auto_pull: false
    pull_timeout_minutes: 30
  rag:
    enabled: false
    max_context_docs: 5
    max_context_tokens: 2000
  generation:
    temperature: 0.7
    top_p: 0.9
    max_tokens: 2048

# Virtual Model Routing Configuration
# Allows clients to control RAG behavior through model name suffixes.
# Pattern: {base_model}-{suffix} (e.g., llama3.1-doc, qwen-coder-basic)
virtual_models:
  enabled: true
  
  # Suffix definitions - each suffix defines RAG behavior
  suffixes:
    basic:
      rag_mode: disabled      # No RAG context injection
      filter_categories: null
      description: Pure LLM without RAG context
    context:
      rag_mode: enabled       # RAG with filtered categories
      filter_categories:
        - code
        - config
      description: RAG with code/config context only
    doc:
      rag_mode: enabled       # Full RAG with all documents
      filter_categories: null
      description: Full RAG with all document categories
    smart:
      rag_mode: auto          # LLM decides when to use RAG (Sprint 7+)
      filter_categories: null
      description: AI decides when to use RAG context
  
  # Base model mappings: virtual_base -> real_ollama_model
  mappings:
    llama3.1: llama3.1-local:latest
    qwen-coder: qwen2.5-coder-local:latest
    qwen-vl: qwen3-vl:latest

api:
  host: 0.0.0.0
  port: 8200
  cors_enabled: true
  cors_origins:
  - '*'
  rate_limit:
    enabled: true
    requests_per_minute: 60
  auth:
    enabled: false
    api_key: ''
resources:
  max_workers: 4
  batch_size: 10
  max_file_size_mb: 100
  memory_limit_mb: 2048
logging:
  level: INFO
  max_file_size_mb: 100
  backup_count: 5
  format: json
  console_enabled: true
