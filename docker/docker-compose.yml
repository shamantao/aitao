# =============================================================================
# AI Tao - Docker Compose Orchestration
# =============================================================================
# Orchestrates all AiTao services for easy deployment.
#
# Usage:
#   docker-compose up -d        # Start all services
#   docker-compose down         # Stop all services
#   docker-compose logs -f      # View logs
#
# Services:
#   - aitao-backend: FastAPI REST API (port 8200)
#   - ollama: LLM inference engine (port 11434)
#   - meilisearch: Full-text search engine (port 7700)
#   - open-webui: Web interface for chat (port 3000)
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Ollama - LLM Inference Engine
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: aitao-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G

  # ---------------------------------------------------------------------------
  # Meilisearch - Full-text Search Engine
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.35
    container_name: aitao-meilisearch
    restart: unless-stopped
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY:-}
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ---------------------------------------------------------------------------
  # AiTao Backend - FastAPI REST API
  # ---------------------------------------------------------------------------
  aitao-backend:
    build:
      context: ..
      dockerfile: ./Dockerfile
    container_name: aitao-backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-8200}:8200"
    volumes:
      # Config is embedded in image; override with custom config if needed:
      # - ./config:/app/config:ro
      - ${AITAO_DATA_DIR:-aitao_data}:/app/data
      - ${AITAO_LOGS_DIR:-aitao_logs}:/app/logs
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_MASTER_KEY=${MEILISEARCH_MASTER_KEY:-}
      - API_PORT=8200
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      ollama:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Open WebUI - Web Interface for Chat
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: aitao-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      # Connect to Ollama directly for now (AiTao RAG integration in future)
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=false
      - ENABLE_SIGNUP=false
    depends_on:
      ollama:
        condition: service_healthy

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  default:
    name: aitao-network
    driver: bridge

# -----------------------------------------------------------------------------
# Volumes - Persistent Storage
# -----------------------------------------------------------------------------
volumes:
  ollama_data:
    name: aitao_ollama_data
  meilisearch_data:
    name: aitao_meilisearch_data
  openwebui_data:
    name: aitao_openwebui_data
  aitao_data:
    name: aitao_backend_data
  aitao_logs:
    name: aitao_backend_logs
